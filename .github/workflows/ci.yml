name: "CI"

on:
  push:
    branches:
      - main
      - master
      - development
  pull_request:
    branches:
      - main
      - master
      - development
  workflow_dispatch:

jobs:
  matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "mba (Darwin)"
            os: macos-14
            attr: "darwinConfigurations.mba.system"
          - name: "nixos-test (NixOS)"
            os: ubuntu-latest
            attr: "nixosConfigurations.nixos-test.config.system.build.toplevel"
          - name: "mba-asahi (NixOS ARM)"
            os: ubuntu-22.04-arm
            attr: "nixosConfigurations.mba-asahi.config.system.build.toplevel"
          - name: "sliceanddice (NixOS x86_64)"
            os: ubuntu-latest
            attr: "nixosConfigurations.sliceanddice.config.system.build.toplevel"
          - name: "8amps-linux (Home Manager)"
            os: ubuntu-latest
            attr: "homeConfigurations.8amps-linux.activationPackage"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rampage Mode (Nothing but Nix)
        if: runner.os == 'Linux'
        uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: "rampage"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            build-dir = /nix/build

      - name: Set up Magic Nix Cache
        if: runner.os == 'Linux'
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build ${{ matrix.name }}
        run: |
          # Use quotes for Home Manager config name with dashes
          if [[ "${{ matrix.attr }}" == *"8amps-linux"* ]]; then
             nix build .#homeConfigurations.\"8amps-linux\".activationPackage --print-build-logs
          else
             nix build .#${{ matrix.attr }} --print-build-logs
          fi

  secretspec-demo:
    name: secretspec demo declarations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Validate secretspec.toml declarations (no decrypt)
        run: |
          set -euo pipefail
          nix profile install nixpkgs#secretspec
          test -f testdata/secretspec-demo/secretspec.toml
          # Ensure required keys are declared; do not require provider values in public CI.
          grep -q 'DEMO_API_KEY' testdata/secretspec-demo/secretspec.toml
          grep -q 'DEMO_DATABASE_URL' testdata/secretspec-demo/secretspec.toml
          grep -q 'pass://secretspec/shared' testdata/secretspec-demo/secretspec.toml
          if secretspec check --help >/dev/null 2>&1; then
            (cd testdata/secretspec-demo && secretspec check) || true
          fi
          echo "OK secretspec demo declarations"

  publish:
    needs: [matrix, secretspec-demo]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish to Upstream Development Channel
        run: |
          echo "All builds passed. The 'development' channel is now validated."
          # If the user has a specific 'development' channel branch or FlakeHub integration:
          # nix run .#publish-to-flakehub -- --channel development
          # For now, we signal success.
