# Home-manager SecretSpec declarations (values live in private pass store).
#
# pass paths: secretspec/shared/default/<NAME>

[project]
name = "dendritic-home"
revision = "1.0"
require_reason = false

[providers]
pass = "pass://secretspec/shared/{profile}/{key}"

[profiles.default]
SHIT_PASSWORD = { description = "Test secret written to ~/.shit on activation", providers = ["pass"] }
PEE_PASSWORD = { description = "Test secret written to ~/.pee on activation", providers = ["pass"] }
GH_TOKEN = { description = "Legacy classic GitHub PAT (fallback if App not bootstrapped)", providers = ["pass"] }
GH_APP_CLIENT_ID = { description = "GitHub App client ID for API token minting", providers = ["pass"] }
GH_APP_CLIENT_SECRET = { description = "GitHub App client secret", providers = ["pass"] }
GH_APP_ID = { description = "GitHub App numeric id", providers = ["pass"] }
GH_APP_PRIVATE_KEY = { description = "GitHub App PEM private key", providers = ["pass"] }
GH_REFRESH_TOKEN = { description = "GitHub App user refresh_token (ghr_) — mint access via API", providers = ["pass"] }
FLAKEHUB_TOKEN = { description = "FlakeHub token for determinate-nixd / fh login", providers = ["pass"] }
Bubbles = { description = "Home Wi-Fi (Bubbles) WPA-PSK — dendritic.wifi", providers = ["pass"] }
