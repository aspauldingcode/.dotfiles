    role: mid-gemma
    expect: gpu-full-or-hybrid
  # Hybrid / stretch
  - id: qwen2.5-coder:7b
    role: daily-coder
    expect: hybrid
  - id: qwen3:8b
    role: think-general
    expect: hybrid
  - id: gpt-oss:20b
