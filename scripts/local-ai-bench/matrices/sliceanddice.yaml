host: sliceanddice
runtimes:
  - ollama
models:
  # Full-GPU candidates (expect fit in 4GB)
  - id: qwen2.5-coder:1.5b
    role: ultra-light-coder
    expect: gpu-full
  - id: qwen2.5-coder:3b
    role: small-coder
    expect: gpu-full
  - id: llama3.2:1b
    role: ultra-light-chat
    expect: gpu-full
  - id: llama3.2:3b
    role: small-chat
    expect: gpu-full
  - id: gemma3:1b
    role: small-gemma
    expect: gpu-full
