# Copy into the private password-store repo as:
#   .github/workflows/notify-sync.yml
#
# One-byte publish to ntfy on push to the default branch. Clients
# (mba / sliceanddice) long-poll and run PASS_STORE_SYNC_MODE=pull.
#
# Actions secret (once): PASS_STORE_NTFY_TOPIC — same value as sops
# pass_store_ntfy_topic in public .dotfiles (never commit the topic).
name: notify-sync

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ntfy ping
        env:
          TOPIC: ${{ secrets.PASS_STORE_NTFY_TOPIC }}
        run: |
          set -euo pipefail
          test -n "${TOPIC}"
          curl -fsS -d "1" "https://ntfy.sh/${TOPIC}"
