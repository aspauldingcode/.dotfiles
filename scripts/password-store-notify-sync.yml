# Copy into the private password-store repo as:
#   .github/workflows/notify-sync.yml
#
# BACKUP ONLY. Primary peer wake is host-side: after a successful
# `git push`, pass-store-sync.sh publishes one byte to ntfy (same topic).
# This workflow covers the case where the pushing host could not reach
# ntfy (offline network path, missing sops topic file, etc.).
#
# Actions secret (once): PASS_STORE_NTFY_TOPIC — same value as sops
# pass_store_ntfy_topic in public .dotfiles (never commit the topic).
name: notify-sync

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: notify-sync
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: ntfy ping
        env:
          TOPIC: ${{ secrets.PASS_STORE_NTFY_TOPIC }}
        run: |
          set -euo pipefail
          test -n "${TOPIC}"
          curl -fsS --max-time 15 -d "1" "https://ntfy.sh/${TOPIC}"
