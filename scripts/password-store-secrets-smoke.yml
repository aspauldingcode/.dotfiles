# Secrets smoke test for the private password-store.
# Decrypts template entries with a CI-only GPG key (never Alex's personal key).
name: secrets-smoke

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1" # weekly Monday

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      PASSWORD_STORE_DIR: ${{ github.workspace }}
      GNUPGHOME: ${{ github.workspace }}/.gnupg-ci
    steps:
      - name: Checkout password-store
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Install tools
        run: |
          nix profile install \
            nixpkgs#pass \
            nixpkgs#gnupg \
            nixpkgs#secretspec \
            nixpkgs#git

      - name: Import CI GPG key
        env:
          CI_GPG_PRIVATE_KEY: ${{ secrets.CI_GPG_PRIVATE_KEY }}
          CI_GPG_PASSPHRASE: ${{ secrets.CI_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          # Configure agent before any gpg use (loopback only; no preset needed).
          printf '%s\n' 'allow-loopback-pinentry' >"$GNUPGHOME/gpg-agent.conf"
          printf '%s\n' 'pinentry-mode loopback' >"$GNUPGHOME/gpg.conf"
          KEYFILE="$(mktemp)"
          printf '%s\n' "$CI_GPG_PRIVATE_KEY" >"$KEYFILE"
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$CI_GPG_PASSPHRASE" --import "$KEYFILE"
          rm -f "$KEYFILE"
          gpg --list-secret-keys --keyid-format LONG

      - name: Assert pass templates decrypt
        env:
          CI_GPG_PASSPHRASE: ${{ secrets.CI_GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          decrypt() {
            gpg --batch --quiet --pinentry-mode loopback \
              --passphrase "$CI_GPG_PASSPHRASE" \
              --decrypt "$PASSWORD_STORE_DIR/${1}.gpg" | tr -d '\r'
          }
          expect_eq() {
            local path="$1" want="$2"
            got="$(decrypt "$path")"
            if [[ "$got" != "$want" ]]; then
              echo "FAIL $path: got=$(printf '%q' "$got") want=$(printf '%q' "$want")" >&2
              exit 1
            fi
            echo "OK $path"
          }
          expect_eq "_bootstrap/ok" "ok"
          expect_eq "secretspec/shared/default/DEMO_API_KEY" "demo-not-a-real-key"
          expect_eq "secretspec/shared/default/DEMO_DATABASE_URL" "postgres://demo:demo@localhost/demo"
          login="$(decrypt "test/example-login")"
          echo "$login" | grep -q 'demo@example.com'
          echo "$login" | grep -q 'demo-password-not-real'
          echo "OK test/example-login"

      - name: SecretSpec demo
        env:
          CI_GPG_PASSPHRASE: ${{ secrets.CI_GPG_PASSPHRASE }}
          SECRETSPEC_PROVIDER: "pass://secretspec/shared/{profile}/{key}"
          PASSWORD_STORE_GPG_OPTS: "--pinentry-mode loopback"
        run: |
          set -euo pipefail
          # Feed passphrase via loopback for `pass`/`secretspec`.
          export GPG_TTY=""
          # Write passphrase to agent-less decrypt helper for pass:
          # gpg.conf already has pinentry-mode loopback; pass passphrase via opts.
          export PASSWORD_STORE_GPG_OPTS="--pinentry-mode loopback --passphrase ${CI_GPG_PASSPHRASE}"
          pass show _bootstrap/ok | grep -qx ok
          cd .ci
          got="$(secretspec run -- printenv DEMO_API_KEY)"
          [[ "$got" == "demo-not-a-real-key" ]] || {
            echo "secretspec DEMO_API_KEY mismatch: $got" >&2
            exit 1
          }
          gotdb="$(secretspec run -- printenv DEMO_DATABASE_URL)"
          [[ "$gotdb" == "postgres://demo:demo@localhost/demo" ]] || {
            echo "secretspec DEMO_DATABASE_URL mismatch: $gotdb" >&2
            exit 1
          }
          echo "OK secretspec DEMO_*"
