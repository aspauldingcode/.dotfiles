# SecretSpec demo declarations only — values live in the private pass store.
#
# Expected pass paths (shared provider prefix):
#   secretspec/shared/default/DEMO_API_KEY
#   secretspec/shared/default/DEMO_DATABASE_URL
#
# Smoke (after pass is unlocked):
#   secretspec run --provider "pass://secretspec/shared/{profile}/{key}" -- printenv DEMO_API_KEY

[project]
name = "secretspec-demo"
revision = "1.0"
require_reason = false

[providers]
pass = "pass://secretspec/shared/{profile}/{key}"

[profiles.default]
DEMO_API_KEY = { description = "Demo API key for pass/SecretSpec smoke tests", providers = ["pass"] }
DEMO_DATABASE_URL = { description = "Demo database URL for pass/SecretSpec smoke tests", providers = ["pass"] }
